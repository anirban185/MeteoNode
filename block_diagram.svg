<svg width="680" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" style="font-family:monospace;background:#fff">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 2L8 5L1 8" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- solar panels -->
  <rect x="41" y="38" width="122" height="40" rx="2" fill="none" stroke="#222" stroke-width="1.3"/>
  <text x="102" y="54" text-anchor="middle" font-size="12" fill="#222">solar panels ×2</text>
  <text x="102" y="70" text-anchor="middle" font-size="10" fill="#666">5V 2W each</text>

  <!-- solar → TP5000 -->
  <line x1="163" y1="58" x2="218" y2="58" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="189" y="52" text-anchor="middle" font-size="9" fill="#888">1N5819</text>

  <!-- TP5000 -->
  <rect x="218" y="38" width="110" height="40" rx="2" fill="none" stroke="#222" stroke-width="1.5"/>
  <text x="273" y="54" text-anchor="middle" font-size="12" fill="#222">TP5000</text>
  <text x="273" y="70" text-anchor="middle" font-size="10" fill="#666">buck charger</text>

  <!-- TP5000 ↔ battery -->
  <line x1="268" y1="78" x2="268" y2="126" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="280" y1="128" x2="280" y2="80" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- battery -->
  <rect x="210" y="128" width="126" height="42" rx="2" fill="none" stroke="#222" stroke-width="1.3"/>
  <text x="273" y="145" text-anchor="middle" font-size="12" fill="#222">LiFePO4</text>
  <text x="273" y="161" text-anchor="middle" font-size="10" fill="#666">32700 6Ah 3.2V</text>

  <!-- battery → fuse -->
  <line x1="336" y1="149" x2="384" y2="149" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="358" y="143" text-anchor="middle" font-size="9" fill="#888">1N5819</text>

  <!-- fuse -->
  <rect x="384" y="132" width="68" height="36" rx="2" fill="none" stroke="#222" stroke-width="1.2"/>
  <text x="418" y="149" text-anchor="middle" font-size="11" fill="#222">fuse 3A</text>
  <text x="418" y="162" text-anchor="middle" font-size="9" fill="#666">glass</text>

  <!-- fuse → soft latch -->
  <line x1="452" y1="149" x2="498" y2="149" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- soft latch -->
  <rect x="498" y="128" width="138" height="44" rx="2" fill="none" stroke="#222" stroke-width="1.4"/>
  <text x="567" y="146" text-anchor="middle" font-size="11" fill="#222">soft-latch</text>
  <text x="567" y="162" text-anchor="middle" font-size="9" fill="#666">FDN304P + 2N7000</text>

  <!-- soft latch → ESP32 -->
  <line x1="567" y1="172" x2="567" y2="214" stroke="#222" stroke-width="1.2"/>
  <line x1="567" y1="214" x2="420" y2="214" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ESP32 -->
  <rect x="180" y="214" width="240" height="72" rx="2" fill="none" stroke="#222" stroke-width="1.8"/>
  <text x="300" y="238" text-anchor="middle" font-size="12" fill="#222">ESP32-WROOM-32UE</text>
  <text x="300" y="256" text-anchor="middle" font-size="10" fill="#666">GPIO34 ADC  GPIO5 latch hold</text>
  <text x="300" y="272" text-anchor="middle" font-size="10" fill="#666">GPIO21/22 I2C   WiFi</text>

  <!-- latch-hold feedback dashed -->
  <path d="M420 228 L470 228 L470 150 L498 150" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="478" y="192" text-anchor="middle" font-size="9" fill="#aaa">hold</text>

  <!-- volt divider tap from battery line -->
  <path d="M210 149 L148 149 L148 188" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- volt divider box -->
  <rect x="112" y="188" width="72" height="34" rx="2" fill="none" stroke="#aaa" stroke-width="1"/>
  <text x="148" y="202" text-anchor="middle" font-size="9" fill="#aaa">100K/100K</text>
  <text x="148" y="214" text-anchor="middle" font-size="9" fill="#aaa">divider</text>
  <!-- divider → ESP32 GPIO34 -->
  <path d="M148 222 L148 234 L210 234" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="122" y="246" font-size="9" fill="#aaa">GPIO34</text>

  <!-- decoupling note -->
  <text x="498" y="236" font-size="9" fill="#aaa">1000µF + 100nF</text>
  <text x="498" y="248" font-size="9" fill="#aaa">on power rail</text>

  <!-- I2C down -->
  <line x1="300" y1="286" x2="300" y2="326" stroke="#222" stroke-width="1.1"/>
  <text x="310" y="310" font-size="9" fill="#888">I2C</text>

  <!-- I2C split -->
  <line x1="186" y1="326" x2="412" y2="326" stroke="#222" stroke-width="1.1"/>
  <line x1="214" y1="326" x2="214" y2="346" stroke="#222" stroke-width="1.1" marker-end="url(#arr)"/>
  <line x1="390" y1="326" x2="390" y2="346" stroke="#222" stroke-width="1.1" marker-end="url(#arr)"/>

  <!-- BMP280 -->
  <rect x="148" y="346" width="130" height="42" rx="2" fill="none" stroke="#222" stroke-width="1.3"/>
  <text x="213" y="363" text-anchor="middle" font-size="12" fill="#222">BMP280</text>
  <text x="213" y="379" text-anchor="middle" font-size="10" fill="#666">pressure  0x76</text>

  <!-- HTU21D -->
  <rect x="326" y="346" width="130" height="42" rx="2" fill="none" stroke="#222" stroke-width="1.3"/>
  <text x="391" y="363" text-anchor="middle" font-size="12" fill="#222">HTU21D</text>
  <text x="391" y="379" text-anchor="middle" font-size="10" fill="#666">temp + humidity  0x40</text>

  <!-- WiFi out left -->
  <line x1="180" y1="258" x2="100" y2="258" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- antenna -->
  <rect x="28" y="238" width="72" height="40" rx="2" fill="none" stroke="#222" stroke-width="1.2"/>
  <text x="64" y="255" text-anchor="middle" font-size="11" fill="#222">antenna</text>
  <text x="64" y="270" text-anchor="middle" font-size="9" fill="#666">MT76813DBI</text>

  <!-- antenna → open-meteo dashed -->
  <line x1="64" y1="278" x2="64" y2="346" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="74" y="318" font-size="9" fill="#aaa">WiFi</text>

  <!-- open-meteo -->
  <rect x="22" y="346" width="104" height="42" rx="2" fill="none" stroke="#222" stroke-width="1.2"/>
  <text x="74" y="363" text-anchor="middle" font-size="11" fill="#222">Open-Meteo</text>
  <text x="74" y="379" text-anchor="middle" font-size="9" fill="#666">forecast API</text>

  <!-- perfboard note -->
  <line x1="40" y1="418" x2="640" y2="418" stroke="#ccc" stroke-width="0.6"/>
  <text x="40" y="436" font-size="10" fill="#aaa">assembled on perfboard — 20AWG power, 28AWG logic — no custom PCB</text>
</svg>
